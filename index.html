<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificación Socio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* Ocupa toda la pantalla */
      background-color: #f5f5f5;
    }
    h1 {
      font-size: 5em; /* Mensaje enorme */
      margin: 0;
    }
  </style>
</head>
<body>
  <h1 id="mensaje">Cargando...</h1>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const socio = urlParams.get('socio');
    const mensaje = document.getElementById('mensaje');

    fetch('https://raw.githubusercontent.com/sociosaveb/carnet-vecinos/main/socios.json')
      .then(res => res.json())
      .then(data => {
        if (!socio || !data[socio]) {
          mensaje.textContent = "⚠️ Socio no encontrado";
          mensaje.style.color = "orange";
        } else if (data[socio] === "ACTIVO") {
          mensaje.textContent = "✅ SOCIO ACTIVO";
          mensaje.style.color = "green";
        } else {
          mensaje.textContent = "❌ SOCIO NO VIGENTE";
          mensaje.style.color = "red";
        }
      })
      .catch(err => {
        mensaje.textContent = "⚠️ Error al cargar datos";
        mensaje.style.color = "orange";
        console.error(err);
      });
  </script>
</body>
</html>
